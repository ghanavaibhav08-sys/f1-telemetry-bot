name: Instant Race Alerts

on:
  schedule:
    # Every 5 minutes — GitHub Actions cron has a practical minimum of ~5 min for reliable free scheduling
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed so the workflow can commit the updated state file back to the repo
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m f1bot.instant_alerts
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      - name: Commit updated alert memory
        run: |
          git config user.name "f1-telemetry-bot"
          git config user.email "actions@github.com"
          git add state/seen_alerts.json
          git diff --staged --quiet || git commit -m "Update seen alerts [skip ci]"
          git push
