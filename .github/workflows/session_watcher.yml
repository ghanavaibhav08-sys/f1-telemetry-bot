name: Session End Watcher

on:
  schedule:
    - cron: "*/15 * * * *"   # check every 15 minutes
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit the updated processed-sessions state
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python -m f1bot.session_watcher
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECIPIENT: ${{ secrets.GMAIL_RECIPIENT }}
      - name: Commit processed-session state
        run: |
          git config user.name "f1-telemetry-bot"
          git config user.email "actions@github.com"
          git add state/processed_sessions.json
          git diff --staged --quiet || git commit -m "Update processed sessions [skip ci]"
          git push
